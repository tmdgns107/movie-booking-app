services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: movie_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
